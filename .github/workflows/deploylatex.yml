
name: MyST PDF builder [LaTeX]

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 23
      - name: Install LaTeX + Python packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            yq \
            imagemagick \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            texlive-xetex \
            latexmk \
            texlive-latex-extra \
            fonts-lmodern \
            nodejs \
            npm
          python -m pip install --upgrade pip
          pip install mystmd

      - name: 🔧 Configure MyST for LaTeX
        run: |
          echo "Configuring myst.yml for LaTeX build..."
          yq -i -Y '.extends = ["toc.yml", "export latex.yml", "plugins.yml"]' myst.yml


      - name: Build PDFs
        run: myst build --pdf
      - name: Build per-file LaTeX 
        run: |
          mkdir -p latex/mainmatter
        
          files=(
            content/Introduction.md
            content/Theory.md
            content/Methods.md
            content/Results.ipynb
            content/Conclusion.md
          )
        
          for f in "${files[@]}"; do
            name=$(basename "$f" | sed 's/\.[^.]*$//')
        
            myst build "$f" --tex
        
            # find actual tex output (MyST is not consistent in naming)
            TEX_FILE=$(find _build/exports -name "*.tex" | head -n 1)
        
            if [ -z "$TEX_FILE" ]; then
              echo "No tex file found for $f"
              exit 1
            fi
        
            cp "$TEX_FILE" "latex/mainmatter/${name}.tex"
        
            # clean between builds to avoid cross-contamination
            rm -rf _build/exports
          done
      # - name: Flatten tex files
      #   run: |
      #     mkdir -p latex/flat
      
      #     for d in latex/mainmatter/*; do
      #       name=$(basename "$d")
      #       cp "$d" "latex/flat/${name}.tex"
      #     done
      - name: Commit and push exports folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add exports folder
          git add -f exports
          git add -f latex

          # Commit if there are changes
          if ! git diff --cached --quiet; then
            timestamp=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
            git commit -m "Update exports folder [La] (${timestamp})"
            
            # Push using the built-in GITHUB_TOKEN
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          else
            echo "No changes to commit"
          fi   
   
