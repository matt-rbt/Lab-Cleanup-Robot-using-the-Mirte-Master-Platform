
name: MyST PDF builder [LaTeX]

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 23
      - name: Install LaTeX + Python packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            yq \
            imagemagick \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            texlive-xetex \
            latexmk \
            texlive-latex-extra \
            fonts-lmodern \
            nodejs \
            npm
          python -m pip install --upgrade pip
          pip install mystmd

      - name: 🔧 Configure MyST for LaTeX
        run: |
          echo "Configuring myst.yml for LaTeX build..."
          yq -i -Y '.extends = ["toc.yml", "export latex.yml", "plugins.yml"]' myst.yml


      - name: Build PDFs
        run: myst build --pdf

      - name: Collect full LaTeX output
        run: |
          mkdir -p latex

          TEX_DIR=$(find _build/temp -type d -name "*" | head -n 1)

          if [ -z "$TEX_DIR" ]; then
            echo "Could not find LaTeX temp directory"
            exit 1
          fi

          echo "Copying LaTeX files from $TEX_DIR"

          # Copy all .tex files
          find "$TEX_DIR" -name "*.tex" -exec cp {} latex/ \;

          # Copy bibliography files if present
          find "$TEX_DIR" -name "*.bib" -exec cp {} latex/ \;

          # Copy any images/assets (optional but useful)
          # find "$TEX_DIR" \( -name "*.png" -o -name "*.jpg" -o -name "*.pdf" \) -exec cp {} latex/ \;

          # Optional: copy everything (simpler but heavier)
          # cp -r "$TEX_DIR"/* latex/

      - name: Commit and push exports folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add exports folder
          git add -f exports
          git add -f latex

          # Commit if there are changes
          if ! git diff --cached --quiet; then
            timestamp=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
            git commit -m "Update exports folder [La] (${timestamp})"
            
            # Push using the built-in GITHUB_TOKEN
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          else
            echo "No changes to commit"
          fi   
   
